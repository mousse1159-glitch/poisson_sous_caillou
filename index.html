<!-- index.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Poisson sous caillou</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- MENU PRINCIPAL -->
<div id="menu" class="panel">
  <h2>POISSON SOUS CAILLOU</h2>
  <p>Choisissez une action</p>

  <button onclick="startGame()">▶ Démarrer</button>
  <button onclick="showRules()">❓ Règles</button>
</div>

<!-- JEU -->
<div id="game" class="panel" style="display:none;">

  <h2>POISSON SOUS CAILLOU</h2>

  <!-- TIMER EN HAUT -->
  <div class="top-bar">
    <div class="timer" id="timer">35:00</div>
  </div>

  <!-- ZONE PRINCIPALE -->
  <div class="game-container">

    <!-- MAP -->
    <div class="map">
  <img src="map.png" alt="Carte du jeu">
</div>

    <!-- MENU LATÉRAL -->
    <div class="sidebar">
      <button onclick="startTimer()">Start</button>
      <button onclick="pauseTimer()">Pause</button>
      <button onclick="openKeypad()">🔢 Code</button>
      <button onclick="goBackMenu()">⬅ Retour</button>
    </div>

  </div>

  <div class="message" id="message"></div>

</div>

<!-- POPUP KEYPAD -->
<div id="keypadModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h3>Entrer le code</h3>

    <div id="codeDisplayModal">----</div>

    <div class="keypad">
      <button onclick="addDigit('1')">1</button>
      <button onclick="addDigit('2')">2</button>
      <button onclick="addDigit('3')">3</button>
      <button onclick="addDigit('4')">4</button>
      <button onclick="addDigit('5')">5</button>
      <button onclick="addDigit('6')">6</button>
      <button onclick="addDigit('7')">7</button>
      <button onclick="addDigit('8')">8</button>
      <button onclick="addDigit('9')">9</button>
      <button onclick="addDigit('0')">0</button>
    </div>

    <button onclick="closeKeypad()">Fermer</button>
  </div>
</div>

<script>
  let timeLeft = 35 * 60;
  let timerInterval = null;
  let enteredCode = "";

  function startGame() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";
  }

  function goBackMenu() {
    document.getElementById("menu").style.display = "block";
    document.getElementById("game").style.display = "none";
  }

  function showRules() {
    alert("Entrez le bon code avant la fin du temps !");
  }

  function updateDisplay() {
    let minutes = Math.floor(timeLeft / 60);
    let seconds = timeLeft % 60;
    document.getElementById("timer").textContent =
      `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
  }

  function startTimer() {
    if (timerInterval) return;

    timerInterval = setInterval(() => {
      if (timeLeft > 0) {
        timeLeft--;
        updateDisplay();
      } else {
        clearInterval(timerInterval);
        document.getElementById("message").textContent = "⏰ Temps écoulé !";
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  // 🔓 ouverture / fermeture popup
  function openKeypad() {
    document.getElementById("keypadModal").style.display = "flex";
  }

  function closeKeypad() {
    document.getElementById("keypadModal").style.display = "none";
  }

  function addDigit(digit) {
    if (enteredCode.length < 4) {
      enteredCode += digit;
      document.getElementById("codeDisplay").textContent = enteredCode;
      document.getElementById("codeDisplayModal").textContent = enteredCode;
    }
  }

  function checkCode() {
    const message = document.getElementById("message");

    if (enteredCode === "1234") {
      message.textContent = "✅ Code correct !";
    } else {
      message.textContent = "❌ Code incorrect.";
    }

    enteredCode = "";
    document.getElementById("codeDisplay").textContent = "----";
    document.getElementById("codeDisplayModal").textContent = "----";
  }

  updateDisplay();
</script>

</body>
</html>
